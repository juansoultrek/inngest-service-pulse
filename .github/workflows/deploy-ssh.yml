name: Deploy production (SSH)

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "index.html"
      - "styles.css"
      - "app.js"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/deploy-ssh.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-inngest-service-pulse
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install and build
        run: npm ci --no-audit --no-fund && npm run build

      - name: Production node_modules
        run: rm -rf node_modules && npm ci --omit=dev --no-audit --no-fund

      - name: Pack deploy bundle
        run: tar -czf deploy-bundle.tar.gz dist index.html styles.css app.js package.json package-lock.json node_modules

      - name: Upload bundle via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USERNAME }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          source: deploy-bundle.tar.gz
          target: ${{ secrets.DEPLOY_REMOTE_APP_DIR }}
          overwrite: true
          debug: false

      - name: Extract on server
        env:
          REMOTE_DIR: ${{ secrets.DEPLOY_REMOTE_APP_DIR }}
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USERNAME }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          envs: REMOTE_DIR
          debug: false
          script: |
            set -euo pipefail
            cd "${REMOTE_DIR}"
            rm -rf dist node_modules
            tar -xzf deploy-bundle.tar.gz
            rm -f deploy-bundle.tar.gz
            mkdir -p tmp
            touch tmp/restart.txt
